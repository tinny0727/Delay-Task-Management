<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mood Energy 能量貼紙</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="notebook">
        <div class="paper-grid">
            <h2 class="date-label">任務能量象限圖</h2>
            
            <div class="quadrant-background">
                <div class="quad q1"><span>高能量 /重要 </span></div>
                <div class="quad q2"><span>低能量 /重要 </span></div>
                <div class="quad q3"><span>高能量 / 不重要 </span></div>
                <div class="quad q4"><span>低能量 / 不重要</span></div>
              
       
            </div>

            <div id="sticker-canvas"></div>
        </div>
        
    </div>
    <div id="trash-can">拖曳至此刪除</div>

    <div id="sticker-tray">
        <div class="tray-inner">
            <div class="sticker-item" onclick="createSticker('high')">
            <img src="分心.png" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
              <div class="sticker-item" onclick="createSticker('anxi')">
            <img src="焦慮.png" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
         <div class="sticker-item" onclick="createSticker('lopie')">
            <img src="內耗.png" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
        <div class="sticker-item" onclick="createSticker('avoid')">
            <img src="逃避.png" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
         <div class="sticker-item" onclick="createSticker('perfy')">
            <img src="IP(1).png" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
           
            <div class="sticker-item task-btn" onclick="createTaskSticker()">＋ 任務</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

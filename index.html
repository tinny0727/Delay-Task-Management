<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mood Energy 能量貼紙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notebook">
        <div class="paper-grid">
            <h2 class="date-label">任務能量象限圖</h2>
            
            <div class="quadrant-background">
                <div class="quad q1"><span>重要 / 緊急</span></div>
                <div class="quad q2"><span>重要 / 不緊急</span></div>
                <div class="quad q3"><span>不重要 / 緊急</span></div>
                <div class="quad q4"><span>不重要 / 不緊急</span></div>
                <div class="type-btn work" onclick="createTaskByType('工作', '#4A90E2')">💻 工作</div>
        <div class="type-btn urgent" onclick="createTaskByType('急件', '#E74C3C')">🔥 急件</div>
        <div class="type-btn life" onclick="createTaskByType('生活', '#F1C40F')">🏠 生活</div>
        <div class="type-btn health" onclick="createTaskByType('休息', '#2ECC71')">🌿 休息</div>
            </div>

            <div id="sticker-canvas"></div>
        </div>
        
    </div>

    <div id="sticker-tray">
        <div class="tray-inner">
            <div class="sticker-item" onclick="createSticker('high')">✨</div>
            <div class="sticker-item" onclick="createSticker('mid')">🌱</div>
            <div class="sticker-item" onclick="createSticker('low')">☁️</div>
            <div class="sticker-item task-btn" onclick="createTaskSticker()">＋ 任務</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
